{% set name = "py_dag" %}
{% set version = "3.0.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py-dag-{{ version }}.tar.gz
  sha256: f40fab991b862b6b6d19de9d2f184e6c479e67ce1d86c30853db25df4d1eaacb

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - dag
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/thieman/py-dag
  summary: Directed acyclic graph implementation
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - shaharh9110
